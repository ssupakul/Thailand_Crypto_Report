name: Yahoo Finance Crypto Screener

# เปลี่ยนมารับ Trigger จากภายนอก (Webhook) และปุ่มกดด้วยมือ
on:
  repository_dispatch:
    types: [cron_trigger] # ตั้งชื่อ Event Type ไว้สอดคล้องกับที่จะเซ็ตใน cron-job.org
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Screener Script
      env:
        # อัปเดตตัวแปรระบบให้เป็นของ Telegram ตามสคริปต์ใหม่ของเรา
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py
